<div class="page">
  <div class="page-header">
    <div class="page-title">
      <h1>課程群組 CourseGroup</h1>
      <span class="subtitle">課程群組分類代碼表</span>
    </div>
    <div class="page-actions">
      <button
        pButton
        type="button"
        label="搜尋條件"
        icon="pi pi-filter"
        class="p-button-outlined p-button-secondary"
        (click)="filterVisible.set(true)"
      ></button>
      <button pButton type="button" label="新增" icon="pi pi-plus" severity="success" (click)="add()"></button>
    </div>
  </div>

  <div class="card">
    <p-table
      [value]="groups()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="page.rows"
      [first]="page.first"
      [rowsPerPageOptions]="[10, 20, 50]"
      [sortField]="sort.sortField ?? 'pkid'"
      [sortOrder]="sort.sortOrder"
      (onSort)="onSort($event)"
      (onPage)="onPage($event)"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="{first}–{last} 筆，共 {totalRecords} 筆"
      dataKey="pkid"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="pkid" style="width: 8rem">主代碼 <p-sortIcon field="pkid" /></th>
          <th pSortableColumn="description">群組名稱 <p-sortIcon field="description" /></th>
          <th style="width: 10rem">操作</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-group>
        <tr>
          <td>{{ group.pkid }}</td>
          <td>
            <a class="link" (click)="view(group)">{{ group.description }}</a>
          </td>
          <td>
            <div class="row-actions">
              <button pButton type="button" icon="pi pi-eye" class="p-button-text p-button-rounded"
                      pTooltip="檢視" (click)="view(group)"></button>
              <button pButton type="button" icon="pi pi-pencil" class="p-button-text p-button-rounded"
                      pTooltip="編輯" (click)="edit(group)"></button>
              <button pButton type="button" icon="pi pi-trash" class="p-button-text p-button-rounded p-button-danger"
                      pTooltip="刪除" (click)="confirmDelete(group)"></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3" class="text-muted" style="text-align: center; padding: 1.5rem">查無資料</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-drawer [(visible)]="filterVisibleModel" header="搜尋條件" position="right" [style]="{ width: '360px' }">
  <div class="filter-body">
    <div class="field">
      <label for="f-keyword">關鍵字</label>
      <input id="f-keyword" pInputText class="full-width" [(ngModel)]="filter.keyword"
             placeholder="群組名稱" />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <div class="filter-footer">
      <button pButton type="button" label="重設" icon="pi pi-refresh" class="p-button-text" (click)="resetFilter()"></button>
      <button pButton type="button" label="套用" icon="pi pi-search" (click)="applyFilter()"></button>
    </div>
  </ng-template>
</p-drawer>
