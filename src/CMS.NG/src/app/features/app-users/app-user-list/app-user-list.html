<div class="page">
  <div class="page-header">
    <div class="page-title">
      <h1>使用者 AppUser</h1>
      <span class="subtitle">系統登入帳號</span>
    </div>
    <div class="page-actions">
      <button
        pButton
        type="button"
        label="搜尋條件"
        icon="pi pi-filter"
        class="p-button-outlined p-button-secondary"
        (click)="filterVisible.set(true)"
      ></button>
      <button pButton type="button" label="新增" icon="pi pi-plus" severity="success" (click)="add()"></button>
    </div>
  </div>

  <div class="card">
    <p-table
      [value]="users()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="page.rows"
      [first]="page.first"
      [rowsPerPageOptions]="[10, 20, 50]"
      [sortField]="sort.sortField ?? 'userId'"
      [sortOrder]="sort.sortOrder"
      (onSort)="onSort($event)"
      (onPage)="onPage($event)"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="{first}–{last} 筆，共 {totalRecords} 筆"
      dataKey="userId"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="pkid" style="width: 6rem">主代碼 <p-sortIcon field="pkid" /></th>
          <th pSortableColumn="userId">帳號 <p-sortIcon field="userId" /></th>
          <th pSortableColumn="userName">使用者名稱 <p-sortIcon field="userName" /></th>
          <th pSortableColumn="isActive" style="width: 7rem">啟用 <p-sortIcon field="isActive" /></th>
          <th pSortableColumn="roleCount" style="width: 7rem">角色數 <p-sortIcon field="roleCount" /></th>
          <th pSortableColumn="passwordUpdatedTime" style="width: 12rem">密碼更新時間 <p-sortIcon field="passwordUpdatedTime" /></th>
          <th style="width: 10rem">操作</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>
          <td>{{ user.pkid }}</td>
          <td>
            <a class="link" (click)="view(user)">{{ user.userId }}</a>
          </td>
          <td>{{ user.userName }}</td>
          <td>
            <p-tag [value]="user.isActive ? '啟用' : '停用'" [severity]="user.isActive ? 'success' : 'secondary'" />
          </td>
          <td>{{ user.roleCount }}</td>
          <td>{{ user.passwordUpdatedTime ? (user.passwordUpdatedTime + 'Z' | date: 'yyyy-MM-dd HH:mm') : '—' }}</td>
          <td>
            <div class="row-actions">
              <button pButton type="button" icon="pi pi-eye" class="p-button-text p-button-rounded"
                      pTooltip="檢視" (click)="view(user)"></button>
              <button pButton type="button" icon="pi pi-pencil" class="p-button-text p-button-rounded"
                      pTooltip="編輯" (click)="edit(user)"></button>
              <button pButton type="button" icon="pi pi-trash" class="p-button-text p-button-rounded p-button-danger"
                      pTooltip="刪除" (click)="confirmDelete(user)"></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7" class="text-muted" style="text-align: center; padding: 1.5rem">查無資料</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-drawer [(visible)]="filterVisibleModel" header="搜尋條件" position="right" [style]="{ width: '360px' }">
  <div class="filter-body">
    <div class="field">
      <label for="f-keyword">關鍵字</label>
      <input id="f-keyword" pInputText class="full-width" [(ngModel)]="filter.keyword"
             placeholder="帳號／使用者名稱" />
    </div>
    <div class="field">
      <label for="f-active">啟用狀態</label>
      <p-select inputId="f-active" [options]="activeOptions" [(ngModel)]="filter.isActive"
                optionLabel="label" optionValue="value" appendTo="body" styleClass="full-width" />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <div class="filter-footer">
      <button pButton type="button" label="重設" icon="pi pi-refresh" class="p-button-text" (click)="resetFilter()"></button>
      <button pButton type="button" label="套用" icon="pi pi-search" (click)="applyFilter()"></button>
    </div>
  </ng-template>
</p-drawer>
