<div class="page">
  <div class="page-header">
    <div class="page-title">
      <h1>原廠 Partner</h1>
      <span class="subtitle">原廠（合作廠商）主資料</span>
    </div>
    <div class="page-actions">
      <button
        pButton
        type="button"
        label="搜尋條件"
        icon="pi pi-filter"
        class="p-button-outlined p-button-secondary"
        (click)="filterVisible.set(true)"
      ></button>
      <button pButton type="button" label="新增" icon="pi pi-plus" severity="success" (click)="add()"></button>
    </div>
  </div>

  <div class="card">
    <p-table
      [value]="partners()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="page.rows"
      [first]="page.first"
      [rowsPerPageOptions]="[10, 20, 50]"
      [sortField]="sort.sortField ?? 'displayOrder'"
      [sortOrder]="sort.sortOrder"
      (onSort)="onSort($event)"
      (onPage)="onPage($event)"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="{first}–{last} 筆，共 {totalRecords} 筆"
      dataKey="pkid"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="pkid" style="width: 7rem">主代碼 <p-sortIcon field="pkid" /></th>
          <th pSortableColumn="displayOrder" style="width: 8rem">顯示順序 <p-sortIcon field="displayOrder" /></th>
          <th pSortableColumn="name">原廠名稱 <p-sortIcon field="name" /></th>
          <th pSortableColumn="appKey" style="width: 10rem">應用金鑰 <p-sortIcon field="appKey" /></th>
          <th pSortableColumn="nameOnCourseDetailPage">課程頁顯示名稱 <p-sortIcon field="nameOnCourseDetailPage" /></th>
          <th style="width: 12rem">操作</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-partner>
        <tr>
          <td>{{ partner.pkid }}</td>
          <td>{{ partner.displayOrder }}</td>
          <td>
            <a class="link" (click)="view(partner)">{{ partner.name }}</a>
          </td>
          <td>{{ partner.appKey }}</td>
          <td>{{ partner.nameOnCourseDetailPage }}</td>
          <td>
            <div class="row-actions">
              <button pButton type="button" icon="pi pi-book" class="p-button-text p-button-rounded"
                      pTooltip="查看課程" (click)="viewCourses(partner)"></button>
              <button pButton type="button" icon="pi pi-eye" class="p-button-text p-button-rounded"
                      pTooltip="檢視" (click)="view(partner)"></button>
              <button pButton type="button" icon="pi pi-pencil" class="p-button-text p-button-rounded"
                      pTooltip="編輯" (click)="edit(partner)"></button>
              <button pButton type="button" icon="pi pi-trash" class="p-button-text p-button-rounded p-button-danger"
                      pTooltip="刪除" (click)="confirmDelete(partner)"></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-muted" style="text-align: center; padding: 1.5rem">查無資料</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-drawer [(visible)]="filterVisibleModel" header="搜尋條件" position="right" [style]="{ width: '360px' }">
  <div class="filter-body">
    <div class="field">
      <label for="f-keyword">關鍵字</label>
      <input id="f-keyword" pInputText class="full-width" [(ngModel)]="filter.keyword"
             placeholder="原廠名稱／金鑰／顯示名稱" />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <div class="filter-footer">
      <button pButton type="button" label="重設" icon="pi pi-refresh" class="p-button-text" (click)="resetFilter()"></button>
      <button pButton type="button" label="套用" icon="pi pi-search" (click)="applyFilter()"></button>
    </div>
  </ng-template>
</p-drawer>
