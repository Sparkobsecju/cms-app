<div class="page">
  <div class="page-header">
    <div class="page-title">
      <h1>發布狀態 PublishStatus</h1>
      <span class="subtitle">內容發布狀態代碼表</span>
    </div>
    <div class="page-actions">
      <button
        pButton
        type="button"
        label="搜尋條件"
        icon="pi pi-filter"
        class="p-button-outlined p-button-secondary"
        (click)="filterVisible.set(true)"
      ></button>
      <button pButton type="button" label="新增" icon="pi pi-plus" severity="success" (click)="add()"></button>
    </div>
  </div>

  <div class="card">
    <p-table
      [value]="statuses()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="page.rows"
      [first]="page.first"
      [rowsPerPageOptions]="[10, 20, 50]"
      [sortField]="sort.sortField ?? 'pkid'"
      [sortOrder]="sort.sortOrder"
      (onSort)="onSort($event)"
      (onPage)="onPage($event)"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="{first}–{last} 筆，共 {totalRecords} 筆"
      dataKey="pkid"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="pkid" style="width: 6rem">主代碼 <p-sortIcon field="pkid" /></th>
          <th pSortableColumn="description">狀態說明 <p-sortIcon field="description" /></th>
          <th pSortableColumn="isDraft" style="width: 8rem">草稿 <p-sortIcon field="isDraft" /></th>
          <th pSortableColumn="isPublished" style="width: 8rem">已發布 <p-sortIcon field="isPublished" /></th>
          <th pSortableColumn="isDiscontinued" style="width: 8rem">已停用 <p-sortIcon field="isDiscontinued" /></th>
          <th style="width: 10rem">操作</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-status>
        <tr>
          <td>{{ status.pkid }}</td>
          <td>
            <a class="link" (click)="view(status)">{{ status.description }}</a>
          </td>
          <td>
            <p-tag [value]="status.isDraft ? '是' : '否'" [severity]="status.isDraft ? 'success' : 'secondary'" />
          </td>
          <td>
            <p-tag [value]="status.isPublished ? '是' : '否'" [severity]="status.isPublished ? 'success' : 'secondary'" />
          </td>
          <td>
            <p-tag [value]="status.isDiscontinued ? '是' : '否'" [severity]="status.isDiscontinued ? 'success' : 'secondary'" />
          </td>
          <td>
            <div class="row-actions">
              <button pButton type="button" icon="pi pi-eye" class="p-button-text p-button-rounded"
                      pTooltip="檢視" (click)="view(status)"></button>
              <button pButton type="button" icon="pi pi-pencil" class="p-button-text p-button-rounded"
                      pTooltip="編輯" (click)="edit(status)"></button>
              <button pButton type="button" icon="pi pi-trash" class="p-button-text p-button-rounded p-button-danger"
                      pTooltip="刪除" (click)="confirmDelete(status)"></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-muted" style="text-align: center; padding: 1.5rem">查無資料</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-drawer [(visible)]="filterVisibleModel" header="搜尋條件" position="right" [style]="{ width: '360px' }">
  <div class="filter-body">
    <div class="field">
      <label for="f-keyword">關鍵字</label>
      <input id="f-keyword" pInputText class="full-width" [(ngModel)]="filter.keyword"
             placeholder="狀態說明" />
    </div>
    <div class="field">
      <label for="f-draft">草稿</label>
      <p-select inputId="f-draft" [options]="triOptions" [(ngModel)]="filter.isDraft"
                optionLabel="label" optionValue="value" appendTo="body" styleClass="full-width" />
    </div>
    <div class="field">
      <label for="f-published">已發布</label>
      <p-select inputId="f-published" [options]="triOptions" [(ngModel)]="filter.isPublished"
                optionLabel="label" optionValue="value" appendTo="body" styleClass="full-width" />
    </div>
    <div class="field">
      <label for="f-discontinued">已停用</label>
      <p-select inputId="f-discontinued" [options]="triOptions" [(ngModel)]="filter.isDiscontinued"
                optionLabel="label" optionValue="value" appendTo="body" styleClass="full-width" />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <div class="filter-footer">
      <button pButton type="button" label="重設" icon="pi pi-refresh" class="p-button-text" (click)="resetFilter()"></button>
      <button pButton type="button" label="套用" icon="pi pi-search" (click)="applyFilter()"></button>
    </div>
  </ng-template>
</p-drawer>
