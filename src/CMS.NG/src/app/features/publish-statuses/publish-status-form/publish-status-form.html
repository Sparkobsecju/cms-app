<form class="page" [formGroup]="form" (ngSubmit)="save()">
  <div class="page-header">
    <div class="page-title">
      <h1>{{ isEdit() ? '編輯發布狀態' : '新增發布狀態' }}</h1>
    </div>
    <div class="page-actions">
      @if (isEdit() && recordPkid(); as id) {
        <app-row-audit-badge tableName="PublishStatus" [pkid]="id" />
      }
      <button pButton type="button" label="取消" icon="pi pi-times"
              class="p-button-outlined p-button-secondary" (click)="cancel()"></button>
      <button pButton type="submit" label="儲存" icon="pi pi-check" severity="success"
              [disabled]="saving()"></button>
    </div>
  </div>

  @if (loading()) {
    <div class="card text-muted">載入中…</div>
  } @else {
    <div class="card">
      <h2 class="card-title">發布狀態資料</h2>

      <div class="field">
        <label for="pkid">主代碼 <span class="required">*</span></label>
        <p-inputNumber inputId="pkid" formControlName="pkid" [useGrouping]="false"
                       [min]="0" [max]="255" styleClass="full-width" placeholder="請輸入主代碼 (0–255)" />
        @if (isInvalid('pkid')) {
          <div class="field-error">請輸入主代碼</div>
        }
      </div>

      <div class="field">
        <label for="description">狀態說明 <span class="required">*</span></label>
        <input id="description" pInputText class="full-width" formControlName="description"
               placeholder="請輸入狀態說明" />
        @if (isInvalid('description')) {
          <div class="field-error">請輸入狀態說明</div>
        }
      </div>

      <div class="field-checkbox">
        <p-checkbox inputId="isDraft" formControlName="isDraft" [binary]="true" />
        <label for="isDraft">草稿</label>
      </div>

      <div class="field-checkbox">
        <p-checkbox inputId="isPublished" formControlName="isPublished" [binary]="true" />
        <label for="isPublished">已發布</label>
      </div>

      <div class="field-checkbox">
        <p-checkbox inputId="isDiscontinued" formControlName="isDiscontinued" [binary]="true" />
        <label for="isDiscontinued">已停用</label>
      </div>
    </div>
  }
</form>
