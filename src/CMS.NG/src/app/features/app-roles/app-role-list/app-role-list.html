<div class="page">
  <div class="page-header">
    <div class="page-title">
      <h1>角色 AppRole</h1>
      <span class="subtitle">使用者角色</span>
    </div>
    <div class="page-actions">
      <button
        pButton
        type="button"
        label="搜尋條件"
        icon="pi pi-filter"
        class="p-button-outlined p-button-secondary"
        (click)="filterVisible.set(true)"
      ></button>
      <button pButton type="button" label="新增" icon="pi pi-plus" severity="success" (click)="add()"></button>
    </div>
  </div>

  <div class="card">
    <p-table
      [value]="roles()"
      [loading]="loading()"
      [paginator]="true"
      [rows]="page.rows"
      [first]="page.first"
      [rowsPerPageOptions]="[10, 20, 50]"
      [sortField]="sort.sortField ?? 'roleId'"
      [sortOrder]="sort.sortOrder"
      (onSort)="onSort($event)"
      (onPage)="onPage($event)"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="{first}–{last} 筆，共 {totalRecords} 筆"
      dataKey="roleId"
      styleClass="p-datatable-sm"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="pkid" style="width: 6rem">主代碼 <p-sortIcon field="pkid" /></th>
          <th pSortableColumn="roleId">角色代碼 <p-sortIcon field="roleId" /></th>
          <th pSortableColumn="roleName">角色名稱 <p-sortIcon field="roleName" /></th>
          <th pSortableColumn="permissionLevel" style="width: 9rem">權限等級 <p-sortIcon field="permissionLevel" /></th>
          <th pSortableColumn="description">描述 <p-sortIcon field="description" /></th>
          <th pSortableColumn="userCount" style="width: 8rem">使用者數 <p-sortIcon field="userCount" /></th>
          <th style="width: 10rem">操作</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-role>
        <tr>
          <td>{{ role.pkid }}</td>
          <td>
            <a class="link" (click)="view(role)">{{ role.roleId }}</a>
          </td>
          <td>{{ role.roleName }}</td>
          <td>{{ role.permissionLevel }}</td>
          <td>{{ role.description }}</td>
          <td>{{ role.userCount }}</td>
          <td>
            <div class="row-actions">
              <button pButton type="button" icon="pi pi-eye" class="p-button-text p-button-rounded"
                      pTooltip="檢視" (click)="view(role)"></button>
              <button pButton type="button" icon="pi pi-pencil" class="p-button-text p-button-rounded"
                      pTooltip="編輯" (click)="edit(role)"></button>
              <button pButton type="button" icon="pi pi-trash" class="p-button-text p-button-rounded p-button-danger"
                      pTooltip="刪除" (click)="confirmDelete(role)"></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7" class="text-muted" style="text-align: center; padding: 1.5rem">查無資料</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-drawer [(visible)]="filterVisibleModel" header="搜尋條件" position="right" [style]="{ width: '360px' }">
  <div class="filter-body">
    <div class="field">
      <label for="f-keyword">關鍵字</label>
      <input id="f-keyword" pInputText class="full-width" [(ngModel)]="filter.keyword"
             placeholder="角色代碼／名稱／描述" />
    </div>
    <div class="field">
      <label for="f-level">權限等級</label>
      <p-inputNumber inputId="f-level" [(ngModel)]="filter.permissionLevel" [useGrouping]="false"
                     styleClass="full-width" placeholder="權限等級" />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <div class="filter-footer">
      <button pButton type="button" label="重設" icon="pi pi-refresh" class="p-button-text" (click)="resetFilter()"></button>
      <button pButton type="button" label="套用" icon="pi pi-search" (click)="applyFilter()"></button>
    </div>
  </ng-template>
</p-drawer>
