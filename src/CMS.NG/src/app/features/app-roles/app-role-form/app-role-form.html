<form class="page" [formGroup]="form" (ngSubmit)="save()">
  <div class="page-header">
    <div class="page-title">
      <h1>{{ isEdit() ? '編輯角色' : '新增角色' }}</h1>
    </div>
    <div class="page-actions">
      @if (isEdit() && recordPkid(); as id) {
        <app-row-audit-badge tableName="AppRole" [pkid]="id" />
      }
      <button pButton type="button" label="取消" icon="pi pi-times"
              class="p-button-outlined p-button-secondary" (click)="cancel()"></button>
      <button pButton type="submit" label="儲存" icon="pi pi-check" severity="success"
              [disabled]="saving()"></button>
    </div>
  </div>

  @if (loading()) {
    <div class="card text-muted">載入中…</div>
  } @else {
    <div class="card">
      <h2 class="card-title">角色資料</h2>

      <div class="field">
        <label for="roleId">角色代碼 <span class="required">*</span></label>
        <input id="roleId" pInputText class="full-width" formControlName="roleId"
               placeholder="請輸入角色代碼" />
        @if (isInvalid('roleId')) {
          <div class="field-error">請輸入角色代碼</div>
        }
      </div>

      <div class="field">
        <label for="roleName">角色名稱 <span class="required">*</span></label>
        <input id="roleName" pInputText class="full-width" formControlName="roleName" />
        @if (isInvalid('roleName')) {
          <div class="field-error">請輸入角色名稱</div>
        }
      </div>

      <div class="field">
        <label for="permissionLevel">權限等級 <span class="required">*</span></label>
        <p-inputNumber inputId="permissionLevel" formControlName="permissionLevel"
                       [useGrouping]="false" styleClass="full-width" />
        @if (isInvalid('permissionLevel')) {
          <div class="field-error">請輸入權限等級</div>
        }
      </div>

      <div class="field">
        <label for="description">描述</label>
        <input id="description" pInputText class="full-width" formControlName="description" />
      </div>
    </div>

    <div class="card">
      <h2 class="card-title">使用者</h2>
      <p-multiSelect
        [options]="userOptions()"
        formControlName="userIds"
        optionLabel="label"
        optionValue="userId"
        [filter]="true"
        filterBy="label"
        [maxSelectedLabels]="9999"
        placeholder="選擇使用者（可複選）"
        appendTo="body"
        styleClass="full-width"
      />
    </div>
  }
</form>
